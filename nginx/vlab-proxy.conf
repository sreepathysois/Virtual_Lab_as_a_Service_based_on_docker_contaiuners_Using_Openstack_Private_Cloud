# ============================================================
# vlab-proxy.conf
# NGINX reverse proxy config for VLaaS lab environments.
# Place in /etc/nginx/conf.d/
#
# Pattern: /lab/<env>/ → http://localhost:<port>
# Each lab is accessible via:
#   http://<server-ip>/lab/linux/vnc.html
#   http://<server-ip>/lab/rstudio/
#   http://<server-ip>/lab/jupyter/
# ============================================================

# -------------------------------------------------------
# Linux Lab (noVNC) → port 6901
# -------------------------------------------------------
server {
    listen 80;
    server_name _;

    # --- Linux / SQLite Lab ---
    location /lab/linux/ {
        proxy_pass         http://localhost:6901/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;

        # Optional: enable basic auth for exam mode
        # auth_basic           "VLab Login";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # --- Eclipse / Java Lab ---
    location /lab/eclipse/ {
        proxy_pass         http://localhost:6080/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
    }

    # --- RStudio ---
    location /lab/rstudio/ {
        proxy_pass         http://localhost:8787/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
    }

    # --- Jupyter Notebook ---
    location /lab/jupyter/ {
        proxy_pass         http://localhost:8888/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
    }

    # --- ML GPU Workspace (student1) ---
    location /lab/ml/student1/ {
        proxy_pass         http://localhost:7001/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
    }

    # --- Android Emulator ---
    location /lab/android/ {
        proxy_pass         http://localhost:6080/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
    }
}
